name: Daily Data Update

on:
  schedule:
    - cron: '0 15 * * *'        # UTC 15:00 = 北京时间 23:00
  workflow_dispatch:              # 手动触发（GitHub Actions 页面按钮）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Crawl latest data
        run: python scripts/crawl.py

      - name: Regenerate models
        run: python scripts/model.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push

      - name: Report no change
        if: steps.diff.outputs.changed == 'false'
        run: echo "No new lottery data today. Skipping commit."

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Workflow failed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
