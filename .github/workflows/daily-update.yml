name: Daily Data Update & Deploy

on:
  schedule:
    - cron: '30 15 * * *'      # UTC 15:30 = 北京时间 23:30（开奖后自动更新）
  workflow_dispatch:            # 也可在 Actions 页面手动点击运行

permissions:
  contents: write              # 提交更新后的数据回仓库
  pages: write                 # 部署到 GitHub Pages
  id-token: write              # OIDC 鉴权（deploy-pages 需要）

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Crawl latest lottery data
        run: python scripts/crawl.py

      - name: Check crawl status & warn on partial failure
        if: always()
        run: |
          python - <<'PY'
          import json
          try:
              m = json.load(open('data/.crawl_meta.json'))
          except Exception:
              print("::warning::无法读取 data/.crawl_meta.json，爬取可能未完成")
              raise SystemExit(0)
          if m.get('ssq_failed'):
              print("::warning::双色球爬取失败（中彩网对海外 IP 封禁 403），本次未更新双色球数据，网站将沿用已有数据")
          if m.get('dlt_failed'):
              print("::warning::大乐透爬取失败，本次未更新大乐透数据，网站将沿用已有数据")
          if not m.get('ssq_failed') and not m.get('dlt_failed'):
              print("爬取正常：双色球新增 %d 期，大乐透新增 %d 期" % (m.get('ssq_new',0), m.get('dlt_new',0)))
          PY

      - name: Regenerate prediction models
        run: python scripts/model.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: daily update $(date +%F)"
            git push
          fi

      - name: Build site (only index.html + data/)
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report failure
        if: failure()
        run: echo "::error::Workflow failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
